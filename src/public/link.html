<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.png">
  <title>Ray — Connect Account</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: 'SF Mono', SFMono-Regular, ui-monospace, 'DejaVu Sans Mono', Menlo, Consolas, monospace;
      background: #202023;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .top-logo {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
    }
    .top-logo img { height: 20px; filter: invert(1); }
    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .trust {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      color: #4a4a4f;
      font-size: 11px;
    }
    .trust svg { width: 12px; height: 12px; stroke: #4a4a4f; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 16px; font-weight: 500; margin-bottom: 8px; color: #ffffff; letter-spacing: -0.01em; }
    p { font-size: 13px; color: #9c9da1; margin-bottom: 24px; line-height: 1.6; }
    button {
      background: #ffffff;
      color: #202023;
      border: none;
      padding: 12px 28px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    .success { color: #34d399; font-weight: 500; }
    .error { color: #f87171; font-size: 13px; margin-top: 16px; }
    .checkmark {
      width: 40px;
      height: 40px;
      border: 2px solid #34d399;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .checkmark svg {
      width: 20px;
      height: 20px;
      stroke: #34d399;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .institution-logo {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      object-fit: contain;
      margin-bottom: 16px;
    }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: #9c9da1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="top-logo"><img src="/ray-logo-dark.png" alt="Ray"></div>
  <div class="container">
    <div id="connect-view">
      <div class="spinner"></div>
      <h1>Connecting</h1>
      <p>Opening Plaid...</p>
      <div id="error" class="error" style="display:none"></div>
    </div>
    <div id="success-view" style="display:none">
      <div class="checkmark"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>
      <img id="institution-logo" class="institution-logo" style="display:none" alt="">
      <h1 class="success" id="success-title">Account Connected</h1>
      <p>Syncing transactions. Data stays on your machine. You can close this page.</p>
    </div>
  </div>
  <div class="trust">
    <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    <span>End-to-end encrypted</span>
  </div>

  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
  <script>
    const sessionId = window.location.pathname.split('/link/')[1];
    let linkHandler = null;

    async function initPlaid() {
      // Wait for Plaid SDK to load
      if (typeof Plaid === 'undefined') {
        let attempts = 0;
        await new Promise((resolve, reject) => {
          const check = setInterval(() => {
            if (typeof Plaid !== 'undefined') { clearInterval(check); resolve(); }
            else if (++attempts > 50) { clearInterval(check); reject(new Error('Failed to load Plaid SDK. Check your ad blocker or network connection.')); }
          }, 100);
        });
      }
      try {
        const res = await fetch('/api/link-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Failed to connect. Please run "ray link" again.');
        }
        const { link_token } = await res.json();

        linkHandler = Plaid.create({
          token: link_token,
          onSuccess: async (publicToken, metadata) => {
            document.getElementById('connect-view').innerHTML = '<div class="spinner"></div><h1>Linking</h1><p>Exchanging credentials...</p>';
            try {
              const resp = await fetch('/api/exchange', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  public_token: publicToken,
                  session_id: sessionId,
                  institution_name: metadata.institution?.name || 'Bank Account',
                  institution_id: metadata.institution?.institution_id || null,
                }),
              });
              if (!resp.ok) throw new Error('Exchange failed');
              const result = await resp.json();
              document.getElementById('connect-view').style.display = 'none';
              document.getElementById('success-view').style.display = 'block';
              const instName = result.institution_name || metadata.institution?.name;
              if (instName) {
                document.getElementById('success-title').textContent = instName + ' Connected';
              }
              if (result.institution_logo) {
                const logoEl = document.getElementById('institution-logo');
                logoEl.src = 'data:image/png;base64,' + result.institution_logo;
                logoEl.style.display = 'inline-block';
              }
            } catch (e) {
              showError('Failed to link account. Please try again with "ray link".');
            }
          },
          onExit: (err) => {
            document.getElementById('connect-view').style.display = 'block';
            if (err) showError('Connection cancelled. You can try again.');
          },
        });
        linkHandler.open();
        document.getElementById('connect-view').style.display = 'none';
      } catch (e) {
        showError(e.message || 'This link has expired. Please run "ray link" again.');
      }
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    initPlaid();
  </script>
</body>
</html>
